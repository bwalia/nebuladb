---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nebularebalances.nebula.nebuladb.io
spec:
  group: nebula.nebuladb.io
  names:
    kind: NebulaRebalance
    listKind: NebulaRebalanceList
    plural: nebularebalances
    singular: nebularebalance
    shortNames: [nr, nebrebalance]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Cluster
      type: string
      jsonPath: .spec.clusterRef
    - name: Type
      type: string
      jsonPath: .spec.type
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Progress
      type: integer
      jsonPath: .status.progressPct
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion: {type: string}
          kind: {type: string}
          metadata: {type: object}
          spec:
            type: object
            required: [clusterRef, type]
            properties:
              clusterRef: {type: string}
              type:
                type: string
                enum: [Standard, Failover, Swap]
              nodes:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string}
                    role: {type: string}
              targetFollowers: {type: integer}
              buckets:
                type: array
                items: {type: string}
              snapshotBefore: {type: boolean, default: true}
              compactAfter: {type: boolean, default: true}
              timeoutSeconds: {type: integer, default: 1800}
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Preflight
                - Snapshotting
                - Rebalancing
                - Promoting
                - Draining
                - Completed
                - Failed
                - NotImplemented
              observedGeneration: {type: integer}
              message: {type: string}
              startedAt: {type: string, format: date-time}
              completedAt: {type: string, format: date-time}
              progressPct: {type: integer}
              steps:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              conditions:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
