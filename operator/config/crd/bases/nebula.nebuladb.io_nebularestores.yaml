---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nebularestores.nebula.nebuladb.io
spec:
  group: nebula.nebuladb.io
  names:
    kind: NebulaRestore
    listKind: NebulaRestoreList
    plural: nebularestores
    singular: nebularestore
    shortNames: [nrr, nebrestore]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources: {status: {}}
    additionalPrinterColumns:
    - {name: Backup, type: string, jsonPath: .spec.sourceBackupId}
    - {name: Target, type: string, jsonPath: .spec.targetClusterRef}
    - {name: Phase, type: string, jsonPath: .status.phase}
    - {name: Age, type: date, jsonPath: .metadata.creationTimestamp}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion: {type: string}
          kind: {type: string}
          metadata: {type: object}
          spec:
            type: object
            required: [sourceBackupId, targetClusterRef, storage]
            properties:
              sourceBackupId: {type: string}
              targetClusterRef: {type: string}
              storage:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              pitr:
                type: object
                properties:
                  targetTime: {type: string, format: date-time}
          status:
            type: object
            properties:
              phase: {type: string}
              observedGeneration: {type: integer}
              restoreId: {type: string}
              startedAt: {type: string, format: date-time}
              completedAt: {type: string, format: date-time}
              bytesDownloaded: {type: integer}
              message: {type: string}
              conditions:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
