# NebulaDB demo stack: server + local Ollama + Redis + Prometheus + Grafana.
#
# Usage:
#   docker compose up --build
#
# Services (host-visible ports):
#   nebula-server  -> http://localhost:8080  (REST + SSE RAG)
#                     localhost:50051        (gRPC)
#                     localhost:5433         (Postgres wire, user=any db=any)
#   ollama         -> http://localhost:11434 (local LLM + embeddings)
#   redis          -> localhost:6379         (embedding cache)
#   prometheus     -> http://localhost:9090  (scrape + query)
#   grafana        -> http://localhost:3000  (admin / admin)
#   gatus          -> http://localhost:8280  (stack status page)
#
# First run pulls two Ollama models into the `ollama-models` volume:
# `llama3` (chat) and `nomic-embed-text` (embeddings). Slow the first
# time, fast thereafter. Override via a local `.env`:
#
#   OLLAMA_CHAT_MODEL=phi3
#   OLLAMA_EMBED_MODEL=nomic-embed-text
#   NEBULA_API_KEYS=secret1,secret2

name: nebuladb

# -----------------------------------------------------------------------------
# Reusable fragments. YAML anchors avoid copy-paste drift across services.
# -----------------------------------------------------------------------------
x-restart: &default-restart
  # unless-stopped survives Docker daemon restarts but respects an
  # operator's explicit `docker compose stop`.
  restart: unless-stopped

x-logging: &default-logging
  # Cap per-container log volume. Without this, a chatty service on
  # a long-lived host eats disk. Values are conservative — dev hosts
  # rarely need more than 30 MB of rolling logs per container.
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # Ollama: local LLM + embeddings. Holds the heaviest state (model weights)
  # so the volume is worth keeping between runs.
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: nebula-ollama
    <<: [*default-restart, *default-logging]
    ports:
      - "${NEBULA_OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      # Keeps memory predictable on dev laptops; raise on a beefy server.
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    # `/api/tags` lists installed models; a 200 means the daemon is up
    # even if no model is pulled yet.
    # The ollama image ships only the `ollama` binary (no wget/curl).
    # `ollama list` connects to the local daemon and exits 0 when it's
    # ready — effectively an in-process health probe.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          # Ollama is the only service with a real reason to want GPU /
          # lots of RAM. These caps are dev-machine defaults; remove or
          # raise in prod-like deployments.
          cpus: "4.0"
          memory: 8g

  # ---------------------------------------------------------------------------
  # One-shot: pull both Ollama models and exit. Keeps the main server
  # entrypoint simple (no bash wrapper, no retry loop).
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: nebula-ollama-init
    <<: *default-logging
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      CHAT_MODEL: "${OLLAMA_CHAT_MODEL:-llama3}"
      EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
    # `$$` escapes compose variable interpolation so the shell — not
    # docker compose — expands the vars at runtime. Without this the
    # container saw blank models and exited silently.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "pulling chat model: $${CHAT_MODEL}"
        ollama pull "$${CHAT_MODEL}"
        echo "pulling embed model: $${EMBED_MODEL}"
        ollama pull "$${EMBED_MODEL}"
        echo "done"
    restart: "no"

  # ---------------------------------------------------------------------------
  # Redis: second-tier embedding cache. Optional — the server runs fine
  # without it — but on a multi-replica deployment it means every node
  # benefits from every other node's upstream calls.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    <<: [*default-restart, *default-logging]
    ports:
      - "${NEBULA_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    # `allkeys-lru` so memory pressure silently evicts the oldest
    # embeddings rather than OOM-killing. The cap is split in two:
    #   --maxmemory 384mb: the redis-internal eviction trigger
    #   memory: 512m       : the cgroup-level hard limit
    # We need ~25% headroom between them because redis evicts in
    # batches and can briefly overshoot --maxmemory during heavy
    # writes. With 256m / 320m on 192.168.1.193 the gap closed,
    # eviction churn pegged CPU, and `mget` calls exceeded the
    # client's 150ms NEBULA_REDIS_TIMEOUT_MS — surfacing as the
    # `redis mget timed out` warns in nebula-server. Bumping to
    # 384/512 gives eviction breathing room without losing the cap.
    command:
      - "redis-server"
      - "--maxmemory"
      - "384mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  # ---------------------------------------------------------------------------
  # The main Rust binary. One image, three ports (REST / gRPC / pgwire).
  # ---------------------------------------------------------------------------
  nebula-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: nebuladb/server:dev
    container_name: nebula-server
    # tini as PID 1 so orphaned children (notably the healthcheck
    # wgets when /healthz is slow / wedged) get reaped instead of
    # accumulating as long-lived sleepers under nebula-server.
    # Observed in production: 215 stuck wgets after a 35-minute
    # /healthz hang — they kept piling up because docker's
    # healthcheck timeout kills only the wrapping `sh`, not the
    # child wget, and the orphaned wget reparents to PID 1.
    init: true
    # Allow gdb (run by the runtime watchdog right before it aborts
    # on a silent tokio-runtime wedge) to attach to its own parent
    # process via ptrace. Without this, the watchdog can still dump
    # /proc/self/task/*/{wchan,syscall,status} but cannot produce
    # user-space Rust backtraces — and user-space frames are what
    # actually tell us which task is busy-spinning the runtime.
    cap_add:
      - SYS_PTRACE
    <<: [*default-restart, *default-logging]
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      # Host-side ports are env-overridable so a local dev with 8080
      # already taken can set e.g. NEBULA_REST_HOST_PORT=18080 without
      # editing the file. Container-side stays fixed.
      - "${NEBULA_REST_HOST_PORT:-8080}:8080"
      - "${NEBULA_GRPC_HOST_PORT:-50051}:50051"
      # pgwire on 5433 host-side to avoid clashing with a real Postgres
      # that might be running on 5432.
      - "${NEBULA_PG_HOST_PORT:-5433}:5432"
    volumes:
      # Durability: WAL segments + snapshots live here. When set, the
      # server opens in persistent mode — writes go through the WAL and
      # a snapshot is taken on demand via the Admin tab. Remove this
      # volume (or unset NEBULA_DATA_DIR below) to run fully in-memory.
      - nebula-data:/var/lib/nebuladb
      # Shared snapshots volume (design 0007 §4). The FOLLOWER takes the
      # snapshots and publishes them here; the LEADER reads them from
      # here to compact its WAL. Both nodes mount the SAME volume so the
      # leader never has to take a snapshot itself (no multi-minute
      # index-lock stall on the write-serving node).
      - nebula-snapshots:/var/lib/nebuladb/snapshots-shared
    environment:
      NEBULA_BIND: "0.0.0.0:8080"
      NEBULA_GRPC_BIND: "0.0.0.0:50051"
      NEBULA_PG_BIND: "0.0.0.0:5432"

      # Durability data directory. Set to empty to disable persistence.
      NEBULA_DATA_DIR: "${NEBULA_DATA_DIR:-/var/lib/nebuladb}"

      # Cluster role for the admin view. Defaults to "leader" when
      # we're running inside the replication profile; harmless as
      # "standalone" when followers aren't running.
      NEBULA_NODE_ID: "${NEBULA_NODE_ID:-nebula-leader}"
      NEBULA_NODE_ROLE: "${NEBULA_NODE_ROLE:-leader}"
      # Peer list for the cluster view: id=base-url pairs, comma-
      # separated. Empty by default.
      NEBULA_PEERS: "${NEBULA_PEERS:-nebula-follower=http://nebula-follower:8080}"

      # LLM: point at the Ollama sidecar.
      NEBULA_LLM_OLLAMA_URL: "http://ollama:11434"
      NEBULA_LLM_MODEL: "${OLLAMA_CHAT_MODEL:-llama3}"

      # Embeddings: default to MockEmbedder so the demo runs offline.
      # To use Ollama's embedding model instead, uncomment these:
      #   NEBULA_OPENAI_API_KEY: "dummy"
      #   NEBULA_OPENAI_BASE_URL: "http://ollama:11434/v1"
      #   NEBULA_OPENAI_MODEL: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
      #   NEBULA_EMBED_DIM: "768"
      NEBULA_EMBED_DIM: "384"
      NEBULA_EMBED_CACHE_SIZE: "20000"

      # Second-tier (shared) cache. Remove NEBULA_REDIS_URL to disable.
      NEBULA_REDIS_URL: "redis://redis:6379"
      NEBULA_REDIS_PREFIX: "nebula:embed:"
      NEBULA_REDIS_TTL_SECS: "0"
      # Client-side timeout per redis op. 500ms (was 150ms) — 150
      # was too aggressive on a stack where redis can blip during
      # eviction churn or a brief network hiccup, and every blip
      # surfaced as `redis mget timed out; passing through` in the
      # logs. Cache-miss-on-timeout is the right failure mode (the
      # embedder still works), but not at the rate the old setting
      # produced. The redis-side eviction headroom (384m/512m above)
      # already removes the eviction-churn cause; this is the
      # belt-and-braces ceiling.
      NEBULA_REDIS_TIMEOUT_MS: "500"

      NEBULA_CHUNK_CHARS: "500"
      NEBULA_CHUNK_OVERLAP: "50"
      # Empty => auth disabled. Set NEBULA_API_KEYS=secret1,secret2 in
      # `.env` to require bearer auth.
      NEBULA_API_KEYS: "${NEBULA_API_KEYS:-}"
      # Rate limiter. `on` by default; set to `off` when bulk-loading
      # (the seeder scripts do this). Burst + RPS tune the token
      # bucket when on.
      NEBULA_RATE_LIMIT: "${NEBULA_RATE_LIMIT:-on}"
      NEBULA_RATE_LIMIT_BURST: "${NEBULA_RATE_LIMIT_BURST:-120}"
      NEBULA_RATE_LIMIT_RPS: "${NEBULA_RATE_LIMIT_RPS:-20}"
      # Trust X-Forwarded-For from these peers so per-IP buckets
      # aren't shared across browsers proxied via showcase nginx.
      NEBULA_TRUSTED_PROXIES: "${NEBULA_TRUSTED_PROXIES:-}"
      # Tokio worker count. The container is capped at cpus: 2.0
      # below, which makes available_parallelism() return 2 — too
      # few to absorb a slow request without wedging the runtime.
      # Override here so the runtime has buffer.
      NEBULA_WORKER_THREADS: "${NEBULA_WORKER_THREADS:-8}"
      # Per-request timeout for non-streaming routes. Without this,
      # a stuck handler pins a worker forever; with it, the worker
      # frees after the deadline and the request returns 408.
      NEBULA_REQUEST_TIMEOUT_SECS: "${NEBULA_REQUEST_TIMEOUT_SECS:-30}"
      # Slow-query log: set to 0 to capture every SQL query (demo
      # mode — the Admin tab's Slow queries panel populates
      # instantly). Raise in production to keep the log focused on
      # real outliers (typically 50 or 100 ms).
      NEBULA_SLOW_QUERY_THRESHOLD_MS: "${NEBULA_SLOW_QUERY_THRESHOLD_MS:-10}"
      NEBULA_SLOW_QUERY_CAPACITY: "${NEBULA_SLOW_QUERY_CAPACITY:-32}"

      # Background snapshot scheduler. The snapshot holds the index read
      # lock for the whole serialize, during which writers (and, via
      # parking_lot write-preference, readers) block — the runtime stalls
      # until it finishes. So snapshots must be INFREQUENT and FAST:
      #  - interval 1h (was 15m): the unavoidable ~2-min stall happens
      #    hourly, not every 15 min. With ~39 GiB resident the old 15-min
      #    cadence + 50 MiB size trigger fired constantly and the snapshot
      #    (zstd-3, ~8 min) never completed before the watchdog/OOM killed
      #    it — `snapshot completed` count was 0 across every restart.
      #  - WAL-bytes trigger 1 GiB (was 50 MiB): same reason; bound recovery
      #    replay to ~1 GiB without snapshotting on every few writes.
      # Paired with zstd level 1 (durability.rs) so the lock-hold is ~2 min,
      # comfortably under NEBULA_WATCHDOG_STALL_SECS below. The permanent
      # fix (no stall at all) is a non-blocking COW/fork snapshot — tracked.
      NEBULA_SNAPSHOT_INTERVAL_SECS: "${NEBULA_SNAPSHOT_INTERVAL_SECS:-3600}"
      NEBULA_SNAPSHOT_WAL_BYTES: "${NEBULA_SNAPSHOT_WAL_BYTES:-1073741824}"
      NEBULA_SNAPSHOT_COMPACT: "${NEBULA_SNAPSHOT_COMPACT:-on}"
      # Shared snapshots dir (design 0007 §4): leader and follower point
      # NEBULA_SNAPSHOT_DIR at the same volume mounted above. The leader
      # reads the follower's published snapshots from here to compact.
      NEBULA_SNAPSHOT_DIR: "${NEBULA_SNAPSHOT_DIR:-/var/lib/nebuladb/snapshots-shared}"
      # Offload snapshotting to the follower: the leader runs in
      # compact-only mode and NEVER calls snapshot() (never holds the
      # index read lock for minutes — removes the per-snapshot stall).
      # Leader-only opt-in; the follower derives its role automatically.
      NEBULA_SNAPSHOT_OFFLOAD: "${NEBULA_SNAPSHOT_OFFLOAD:-on}"
      # Runtime-wedge watchdog (aborts on a stalled tokio runtime). Raised
      # 300s -> 600s: a snapshot legitimately stalls the runtime for ~2 min
      # while it holds the index lock, and the old 300s limit fired DURING
      # the snapshot (SIGABRT/134) before it could complete. 600s clears the
      # snapshot hold with margin while still bounding a genuine deadlock.
      NEBULA_WATCHDOG_STALL_SECS: "${NEBULA_WATCHDOG_STALL_SECS:-600}"

      RUST_LOG: "info,nebula_server=debug"
    healthcheck:
      # Liveness probe — 200 as soon as the boot listener is up,
      # *before* WAL recovery completes. /healthz (without /live)
      # still returns 503 during recovery so clients and the
      # showcase nginx pool can fail over to the follower. Without
      # the /live split, docker would kill the container mid-replay
      # on a multi-GB WAL just as recovery is nearly done.
      #
      # `--timeout=2 --tries=1` is load-bearing. The docker
      # healthcheck `timeout: 3s` field below only kills the
      # wrapping `sh -c`; if wget itself is blocked in connect(),
      # docker's SIGTERM races against wget's syscall and the
      # orphaned wget gets reparented to the container's PID 1
      # (nebula-server). With `init: true` reaping zombies AND
      # wget self-timing-out, we never accumulate orphans even
      # when /healthz is wedged for hours.
      test: ["CMD-SHELL", "wget -q --timeout=2 --tries=1 -O /dev/null http://localhost:8080/healthz/live || exit 1"]
      interval: 10s
      timeout: 3s
      # 30 retries × 10s = 5 min of "post-start_period grace". On a
      # host with a multi-GiB dataset, recovery competes with the
      # in-container wget for CPU; under the pressure observed on
      # 192.168.1.193 the healthcheck started failing AFTER
      # start_period elapsed but BEFORE recovery finished. Docker
      # then SIGTERMed a server that was making forward progress.
      # Raised from 10 to 30 to absorb the slowest observed recovery
      # (~13 min on a 4 GiB on-disk dataset).
      retries: 30
      # Recovery now runs *behind* a live HTTP listener, but
      # start_period must cover the *full* expected recovery window
      # for hosts with large datasets — not just the boot-stub hello.
      # Was 60s; bumped to 600s (10 min). On hosts with a tiny dataset
      # this is a no-op (healthcheck flips green within seconds);
      # on the 192.168.1.193-style host with multi-GiB WAL it
      # prevents docker from killing a recovering container mid-replay.
      start_period: 600s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          # 16g, not 8g: 192.168.1.193 grew its dataset past what 8g
          # can absorb during cold-recovery. The peak transient is
          # roughly 3x the on-disk snapshot — load_latest_snapshot
          # decompresses the whole `nsnap` (~GB), bincode-deserializes
          # into the structured copy, and `restore_from_snapshot`
          # materializes the live HNSW arena before the structured
          # copy can be dropped. The on-disk data dir is now ~11 GB and
          # the materialized in-RAM index (HNSW graph + 384-dim vectors
          # + stored docs + text index) sits right around ~16 GiB, so a
          # 16g cap pinned the cgroup at its limit (memory.events `max`
          # in the thousands), thrashed reclaim, dragged recovery out to
          # ~hours, and the leader exited shortly after each recovery
          # instead of staying up. The on-disk data dir is ~11 GB and the
          # cold-recovery transient runs ~3x that (~33 GB), so 40g clears
          # the peak with real margin; 32g sat right at the transient edge
          # 40g/56g/64g were each outgrown: the RAM-resident arena keeps
          # growing with the dataset (~48 GiB -> ~60 GiB in a day; snapshot
          # file 15 -> 22 GiB) and each snapshot OOM-kills (SIGKILL/137,
          # masked by docker as exit-0) once the arena nears the cap. The
          # cap is now operator-tunable via NEBULA_DB_MEM_LIMIT so you can
          # raise it (live: `docker update --memory`, or here for recreates)
          # the moment NebulaMemoryNearCap (85%) fires — no code change.
          #
          # HOST-CAPACITY WALL: this box is 125 GiB and runs BOTH a leader
          # and a follower, each holding the full arena. At ~60 GiB/node
          # that's ~120 GiB before snapshot transients — you cannot keep
          # raising this indefinitely. When the arena nears ~50 GiB the real
          # options are: add host RAM, drop the follower (single-node, frees
          # ~60 GiB), or land the permanent footprint fix (on-disk/quantized
          # HNSW). NEBULA_DB_MEM_LIMIT buys runway, not a permanent fix.
          memory: "${NEBULA_DB_MEM_LIMIT:-80g}"

  # ---------------------------------------------------------------------------
  # Optional follower replica. Tails the leader's WAL over gRPC and
  # mirrors every write into its own local index. Reads land here
  # just as they would on the leader. Keep commented out for a
  # single-node demo; uncomment to exercise replication end-to-end.
  #
  # Followers must NOT take writes — the leader is the only writer
  # in this topology. The read endpoints are fine; mutating calls
  # will diverge the follower from the leader until a follow-up
  # session wires router-level protection.
  # ---------------------------------------------------------------------------
  nebula-follower:
    image: nebuladb/server:dev
    container_name: nebula-follower
    # Same init: true rationale as the leader — reap orphaned
    # healthcheck wgets so they don't pile up under PID 1.
    init: true
    <<: [*default-restart, *default-logging]
    # No depends_on the leader: this whole service exists so reads
    # survive a leader outage. A `condition: service_healthy` gate
    # would prevent the follower from even starting while the leader
    # is in WAL recovery — exactly when we need the follower up.
    # The follower's own gRPC client retries the leader connection
    # on its own schedule.
    ports:
      # Expose on different host ports to avoid clashing with the
      # leader. Container-side matches the leader (same binary).
      - "${NEBULA_FOLLOWER_REST_HOST_PORT:-8081}:8080"
      - "${NEBULA_FOLLOWER_GRPC_HOST_PORT:-50052}:50051"
    volumes:
      # Own data dir — the follower's cursor file lives here so
      # restarts resume from the last-applied record instead of
      # replaying from BEGIN.
      - nebula-follower-data:/var/lib/nebuladb
      # Shared snapshots volume (design 0007 §4) — same volume the
      # leader mounts. The follower OWNS snapshotting: it writes here
      # and prunes here; the leader only reads.
      - nebula-snapshots:/var/lib/nebuladb/snapshots-shared
    environment:
      NEBULA_BIND: "0.0.0.0:8080"
      NEBULA_GRPC_BIND: "0.0.0.0:50051"
      NEBULA_DATA_DIR: "/var/lib/nebuladb"
      # Point at the leader's gRPC endpoint. Inside the compose
      # network the service name resolves to its IP.
      NEBULA_FOLLOW_LEADER: "http://nebula-server:50051"
      # Leader's REST URL — used by /admin/replication to compute
      # lag by probing the leader's own cursor view. Different
      # port from the gRPC URL above.
      NEBULA_LEADER_REST_URL: "http://nebula-server:8080"
      NEBULA_NODE_ID: "nebula-follower"
      NEBULA_NODE_ROLE: "follower"
      NEBULA_PEERS: "nebula-leader=http://nebula-server:8080"
      NEBULA_EMBED_DIM: "384"
      # Same runtime knobs as the leader so the follower has the
      # same survival characteristics. Worker count + request
      # timeout fall back to compose defaults via the `:-` syntax.
      NEBULA_WORKER_THREADS: "${NEBULA_WORKER_THREADS:-8}"
      NEBULA_REQUEST_TIMEOUT_SECS: "${NEBULA_REQUEST_TIMEOUT_SECS:-30}"
      NEBULA_TRUSTED_PROXIES: "${NEBULA_TRUSTED_PROXIES:-}"
      # Follower runs the same snapshot scheduler so its own WAL
      # (built from replicated records) stays compactable. Same
      # infrequent+fast cadence and watchdog margin as the leader (see
      # the leader block for the rationale — snapshot holds the index
      # lock and stalls the runtime, so it must finish under the watchdog).
      NEBULA_SNAPSHOT_INTERVAL_SECS: "${NEBULA_SNAPSHOT_INTERVAL_SECS:-3600}"
      NEBULA_SNAPSHOT_WAL_BYTES: "${NEBULA_SNAPSHOT_WAL_BYTES:-1073741824}"
      NEBULA_SNAPSHOT_COMPACT: "${NEBULA_SNAPSHOT_COMPACT:-on}"
      # Shared snapshots dir (design 0007 §4): the follower writes its
      # snapshots here, stamped with the leader-WAL seq it has applied.
      # No NEBULA_SNAPSHOT_OFFLOAD needed — the follower derives the
      # FollowerSnapshot mode from NEBULA_NODE_ROLE=follower above.
      NEBULA_SNAPSHOT_DIR: "${NEBULA_SNAPSHOT_DIR:-/var/lib/nebuladb/snapshots-shared}"
      NEBULA_WATCHDOG_STALL_SECS: "${NEBULA_WATCHDOG_STALL_SECS:-600}"
      # No Redis / LLM on the follower in the demo — reads don't
      # need them, and adding them would double the memory for no
      # benefit in the default stack.
      RUST_LOG: "info,nebula_server=debug,nebula_grpc=debug"
    healthcheck:
      # Same /healthz/live split as the leader — the follower also
      # runs WAL recovery on boot, so the same kill-loop risk applies.
      # Same retry/start_period sizing rationale as the leader: a
      # multi-GiB recovery on a contended box can't finish inside a
      # 60s grace + 100s of retries.
      test: ["CMD-SHELL", "wget -q --timeout=2 --tries=1 -O /dev/null http://localhost:8080/healthz/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 600s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          # 40g, identical to the leader: the follower runs the same
          # WAL-replay-on-boot path and builds the SAME full in-RAM index
          # from the replicated dataset, so its working set AND its cold-
          # recovery transient (~3x the on-disk snapshot) are the same as
          # the leader's — not a fraction of it. Earlier small caps (512m,
          # then 2g) got SIGKILL'd by the cgroup OOM killer on every
          # restart once the dataset on 192.168.1.193 grew, leaving the
          # follower in Restarting (137) permanently. Effect: showcase
          # nginx round-robins to the dead follower upstream half the time
          # and the user sees 502 / "no live upstreams". Kept symmetric
          # with the leader (56g) so a full replica never OOMs where the
          # leader would not — same arena, same snapshot-transient profile.
          memory: "${NEBULA_DB_MEM_LIMIT:-80g}"

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: nebula-prometheus
    <<: [*default-restart, *default-logging]
    ports:
      - "${NEBULA_PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      nebula-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m

  # ---------------------------------------------------------------------------
  # Optional demo UI. Static React bundle behind nginx, with nginx
  # proxying `/api`, `/healthz`, and `/metrics` to the server so the
  # browser never needs CORS and SSE streams cleanly.
  # Commented out by default; uncomment to include in `docker compose up`.
  # ---------------------------------------------------------------------------
  showcase:
    build:
      context: ./apps/showcase
      dockerfile: Dockerfile
    image: nebuladb/showcase:dev
    container_name: nebula-showcase
    <<: [*default-restart, *default-logging]
    # No `depends_on: service_healthy` on the leader — that would
    # prevent showcase from starting (or being recreated) while the
    # leader is in WAL recovery, which is exactly when we want it
    # up so it can route reads to the follower via nebula_read_pool.
    # nginx tolerates an unreachable upstream at startup (it resolves
    # via docker DNS at request time, not boot).
    depends_on:
      - nebula-server
    ports:
      - "${NEBULA_SHOWCASE_PORT:-5173}:80"
    environment:
      NEBULA_SERVER: "http://nebula-server:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m

  # ---------------------------------------------------------------------------
  # Gatus: lightweight status page that probes every other service in the
  # stack. Useful to tell at a glance "what's up?" without clicking
  # through Prometheus / Grafana / container logs. Config is read-only
  # mounted so edits happen in git, not inside the container.
  # ---------------------------------------------------------------------------
  gatus:
    image: twinproduction/gatus:latest
    container_name: nebula-gatus
    <<: [*default-restart, *default-logging]
    ports:
      # 8280 host-side: 8080 is NebulaDB's, 9090 is Prometheus,
      # 3000 is Grafana. 8280 is a memorable "next to Gatus"
      # (the image defaults to 8080 container-side).
      - "${NEBULA_GATUS_HOST_PORT:-8280}:8080"
    volumes:
      - ./deploy/gatus/config.yaml:/config/config.yaml:ro
    environment:
      GATUS_CONFIG_PATH: "/config/config.yaml"
    depends_on:
      # Start order only — Gatus handles downed targets gracefully
      # (they just turn red), which is the whole point. We don't
      # wait on condition: service_healthy here because Gatus being
      # up even when half the stack is down is a feature.
      nebula-server:
        condition: service_started
    healthcheck:
      # Gatus's own health endpoint.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 96m

  grafana:
    image: grafana/grafana:latest
    container_name: nebula-grafana
    <<: [*default-restart, *default-logging]
    ports:
      - "${NEBULA_GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Anonymous Viewer role lets the demo show panels without login
      # while still keeping edits gated behind admin.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      # Grafana's first-boot provisioning (loading the dashboards +
      # datasource from `/etc/grafana/provisioning`) takes ~30s on
      # GitHub's runners and occasionally races the healthcheck's
      # 50s window (5 retries × 10s). A longer grace period keeps
      # the nightly e2e job from tripping on a slow-but-healthy
      # boot.
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

volumes:
  ollama-models:
  redis-data:
  prometheus-data:
  grafana-data:
  nebula-data:
  nebula-follower-data:
  # Shared snapshots volume (design 0007 §4): mounted on BOTH db nodes.
  # The follower publishes snapshots here; the leader reads them to
  # compact its WAL without ever snapshotting itself.
  nebula-snapshots:
