// NebulaDB gRPC surface.
//
// The service mirrors the REST API so clients can mix transports
// without re-learning the domain model. Names and semantics are
// identical — only the wire format changes.
//
// Streaming is used where the REST side offers SSE (`AIService.Rag`).
// Single-shot RPCs elsewhere keep the surface simple; bidirectional
// streaming for ingest is a future enhancement.

syntax = "proto3";

package nebula.v1;

service DocumentService {
  // Upsert a whole document. Chunks it server-side using the server's
  // configured chunker, same as `POST /api/v1/bucket/:b/document`.
  rpc UpsertDocument(UpsertDocumentRequest) returns (UpsertDocumentResponse);

  // Delete every chunk for a document id.
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
}

service SearchService {
  // Semantic search by natural-language text. Mirrors /api/v1/ai/search.
  rpc SemanticSearch(SemanticSearchRequest) returns (SearchResponse);

  // Raw-vector search. Mirrors /api/v1/vector/search.
  rpc VectorSearch(VectorSearchRequest) returns (SearchResponse);
}

service AIService {
  // Retrieval-augmented generation. Server streams:
  //   1. zero or more `context` chunks (the retrieved snippets),
  //   2. zero or more `answer_delta` chunks (LLM tokens),
  //   3. a final `done` marker.
  //
  // Each `RagChunk` contains exactly one of these variants via the
  // `kind` oneof. Clients should stop reading on `Done`.
  rpc Rag(RagRequest) returns (stream RagChunk);
}

// ---- DocumentService ----

message UpsertDocumentRequest {
  string bucket = 1;
  string doc_id = 2;
  string text = 3;
  // Optional caller-supplied metadata, serialized as JSON text. We use
  // a string rather than google.protobuf.Struct because callers often
  // already have JSON on hand and Struct's number-only semantics
  // silently clobber large integers.
  string metadata_json = 4;
}

message UpsertDocumentResponse {
  string bucket = 1;
  string doc_id = 2;
  uint32 chunks = 3;
}

message DeleteDocumentRequest {
  string bucket = 1;
  string doc_id = 2;
}

message DeleteDocumentResponse {
  string bucket = 1;
  string doc_id = 2;
  uint32 chunks_removed = 3;
}

// ---- SearchService ----

message SemanticSearchRequest {
  string query = 1;
  uint32 top_k = 2;
  // Empty = search all buckets.
  string bucket = 3;
  // Optional HNSW beam width override; 0 means "use server default".
  uint32 ef = 4;
}

message VectorSearchRequest {
  repeated float vector = 1;
  uint32 top_k = 2;
  string bucket = 3;
  uint32 ef = 4;
}

message Hit {
  string bucket = 1;
  string id = 2;
  string text = 3;
  // Distance under the index's metric (smaller = closer).
  float score = 4;
  string metadata_json = 5;
}

message SearchResponse {
  repeated Hit hits = 1;
  uint64 took_ms = 2;
}

// ---- AIService ----

message RagRequest {
  string query = 1;
  uint32 top_k = 2;
  string bucket = 3;
}

message RagChunk {
  oneof kind {
    Hit context = 1;
    string answer_delta = 2;
    // Terminal marker. When received, the client should stop reading
    // even if the stream is technically still open.
    Done done = 3;
    // Mid-stream error from the LLM provider. A compliant client
    // logs it and returns whatever text it has accumulated so far.
    string error = 4;
  }
}

message Done {}

// ---- ReplicationService ----
//
// Server-streaming tail of the leader's WAL, used by follower
// replicas to mirror writes. The follower connects, hands over its
// last-applied cursor, and receives every record from that point
// forward — historical catch-up + live tail are both delivered
// through the same stream.
//
// Why bincode-on-the-wire: the WalRecord variants already have a
// canonical serialization (bincode, via nebula-wal). Re-encoding
// them into proto would double the surface area kept in sync and
// break forward compatibility when we add a variant — the follower
// and leader are always the same NebulaDB version, so this is
// acceptable.
service ReplicationService {
  // Tail the leader's WAL. Server-streams WalTailEntry until the
  // client drops, the server shuts down, or the follower lags so
  // far it would require a segment we've already compacted (in
  // which case the stream closes with a FAILED_PRECONDITION status
  // and the follower must restart from a fresh snapshot).
  rpc TailWal(TailWalRequest) returns (stream WalTailEntry);
}

message TailWalRequest {
  // Where the follower wants to resume. An empty cursor means "give
  // me everything you still have". After each applied entry the
  // follower remembers `next_cursor` so a restart can hand it back
  // here for at-least-once delivery.
  WalCursor start = 1;
}

message WalCursor {
  uint64 segment_seq = 1;
  uint64 byte_offset = 2;
}

message WalTailEntry {
  // Cursor of this record (where it sits on disk).
  WalCursor cursor = 1;
  // Cursor past this record — the resume point for the next entry.
  WalCursor next_cursor = 2;
  // Bincode-serialized nebula_wal::WalRecord. The follower decodes
  // it with the same crate the leader wrote it with.
  bytes record_bincode = 3;
}

// ---- CrossRegionReplicationService ----
//
// Cross-region WAL streaming with an additional bucket filter. Used
// by a non-home region to tail a home region's writes without
// receiving records it has no business applying (buckets owned by
// other regions, or by itself).
//
// Shape is intentionally very similar to ReplicationService — an
// equivalent tail with a region label + bucket allowlist. We keep
// them as separate services so future enforcement (auth, per-region
// rate limiting) can treat cross-region as its own surface.
service CrossRegionReplicationService {
  // Server-streams every WAL record whose bucket is in
  // `buckets_owned_here` (the caller's "I am home for these buckets"
  // declaration is inverted into "give me what I DON'T own"). Empty
  // allowlist means "send everything, I'll filter locally" — useful
  // for bootstrap scans.
  rpc TailCrossRegion(TailCrossRegionRequest) returns (stream CrossRegionEntry);
}

message TailCrossRegionRequest {
  // Resume point (same semantics as TailWal's start).
  WalCursor start = 1;
  // Caller's canonical region name, for server-side observability.
  string caller_region = 2;
  // Bucket names whose home region is the caller (i.e., records for
  // these buckets should NOT be sent — caller already has them). An
  // empty list disables filtering.
  repeated string buckets_owned_by_caller = 3;
}

message CrossRegionEntry {
  // Cursor of this record on the sending region's WAL.
  WalCursor cursor = 1;
  // Cursor past this record.
  WalCursor next_cursor = 2;
  // Bincode-serialized nebula_wal::WalRecord — same format as TailWal.
  bytes record_bincode = 3;
  // Bucket extracted from the record, so the receiver can route it
  // to the right dedupe/apply path without re-decoding bincode.
  string bucket = 4;
  // Sender's region name. Echo'd back so the receiver can label the
  // apply in metrics.
  string source_region = 5;
  // Home epoch at the time of the write. Receivers reject any record
  // whose `home_epoch` is lower than their locally-known epoch for
  // the bucket (failover-came-back-late guard).
  uint64 home_epoch = 6;
}
