# WAL / snapshot durability alerts (issue #69).
#
# These exist to catch the "Bug C" footgun from PR #63: an obsolete
# .env can silently disable the snapshot scheduler, after which the WAL
# grows unbounded and the next cold recovery takes hours. The
# scheduler-enabled gauge catches that directly; the other two catch
# the downstream symptom (WAL growing without a fresh snapshot) even if
# the scheduler is nominally "enabled" but stalled.
#
# Metrics are emitted by nebula-server on /metrics — see
# crates/nebula-server/src/router.rs (render_durability_metrics).
groups:
  - name: nebula-wal-snapshot-health
    rules:
      - alert: NebulaSnapshotSchedulerDisabled
        expr: nebula_snapshot_scheduler_enabled == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Snapshot scheduler is disabled on {{ $labels.instance }}"
          description: >-
            The scheduler env vars (NEBULA_SNAPSHOT_INTERVAL_SECS,
            NEBULA_SNAPSHOT_WAL_BYTES) are set to 0 — the obsolete Bug C
            workaround. Remove them; cold recovery will take hours
            otherwise. See PR #63.

      - alert: NebulaWalUnsnapshottedHigh
        expr: nebula_wal_bytes_since_snapshot > 200 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "WAL has accumulated {{ $value | humanize1024 }}B without a snapshot on {{ $labels.instance }}"
          description: >-
            The compose default snapshot trigger fires at 50 MiB or
            15 min, whichever first. If we're 4x past that, the
            scheduler isn't running. Check /admin/durability and the
            snapshot logs.

      - alert: NebulaSnapshotAgeHigh
        expr: nebula_snapshot_age_seconds > 7200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Last snapshot is {{ $value | humanizeDuration }} old on {{ $labels.instance }}"
          description: >-
            Compose default schedules a snapshot every 15 min. 2h+
            means the scheduler is stalled or disabled.

  # Memory-headroom alerts. The HNSW arena is RAM-resident and grows with
  # the dataset; when it approaches the cgroup cap, the periodic snapshot's
  # transient OOM-kills the leader (SIGKILL/137, which docker masks as a
  # clean exit-0 restart). These fire BEFORE that so the cap can be raised
  # (or the data sharded) ahead of the crash.
  - name: nebula-memory-headroom
    rules:
      - alert: NebulaMemoryNearCap
        expr: nebula_memory_resident_bytes / nebula_memory_limit_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "nebula-server memory at {{ $value | humanizePercentage }} of cgroup cap on {{ $labels.instance }}"
          description: >-
            Resident memory is within 15% of the cgroup limit. A snapshot's
            transient allocation can tip this over the cap into an OOM kill
            (masked by docker as a clean restart). Raise the db-node memory
            limit in docker-compose.yml or reduce the dataset before it
            crashes.

      - alert: NebulaMemoryCritical
        expr: nebula_memory_resident_bytes / nebula_memory_limit_bytes > 0.93
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "nebula-server memory CRITICAL at {{ $value | humanizePercentage }} of cap on {{ $labels.instance }}"
          description: >-
            Resident memory is within 7% of the cgroup cap — an OOM kill on
            the next snapshot is likely. Raise the cap now.

  # Operating-mode / resource-pressure alerts (design 0010). The server
  # derives a single operating mode from memory/disk/CPU pressure with
  # hysteresis and debounce; these alert on the modes that matter and on
  # mode flapping (which means the watermarks need tuning).
  # Mode values: 0=normal 1=cpu 2=memory 3=disk 4=disk_critical.
  - name: nebula-operating-mode
    rules:
      - alert: NebulaDiskCriticalWritesGated
        expr: nebula_operating_mode == 4
        labels:
          severity: critical
        annotations:
          summary: "nebula-server is REFUSING WRITES: data volume critically low on {{ $labels.instance }}"
          description: >-
            Free space on the data volume is below the critical watermark
            (3% or under 2x a WAL segment). Mutations return 503 until
            space is reclaimed: force a snapshot + WAL compact
            (POST /api/v1/admin/snapshot, /api/v1/admin/wal/compact),
            prune old snapshots, or grow the volume.
            See GET /api/v1/admin/reliability for details.

      - alert: NebulaNodeDegraded
        expr: nebula_operating_mode > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "nebula-server degraded (mode {{ $value }}) for 15m+ on {{ $labels.instance }}"
          description: >-
            The node has been under sustained resource pressure. Check
            GET /api/v1/admin/reliability for which resource and the
            transition history.

      - alert: NebulaModeFlapping
        expr: increase(nebula_mode_transitions_total[30m]) > 6
        labels:
          severity: warning
        annotations:
          summary: "nebula-server operating mode is flapping on {{ $labels.instance }}"
          description: >-
            More than 6 mode transitions in 30 minutes despite hysteresis +
            debounce — a resource is oscillating around a watermark. Widen
            the hysteresis band or fix the underlying pressure source.

      - alert: NebulaWritesRejected
        expr: increase(nebula_writes_rejected_total[5m]) > 0
        labels:
          severity: critical
        annotations:
          summary: "Clients are receiving 503 write_unavailable on {{ $labels.instance }}"
          description: >-
            The disk-critical write gate rejected client mutations in the
            last 5 minutes. Reclaim disk space immediately.
