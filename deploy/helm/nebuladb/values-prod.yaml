# Production environment — namespace `prod`, host showcase.nebuladb.net.
# See values-int.yaml for the full rationale. Prod sizes the data
# volume larger and pins a richer resource request; host/namespace/TLS
# secret differ per environment.

server:
  image:
    repository: bwalia/nebula-server
    tag: "latest"
    pullPolicy: IfNotPresent

  # Prod gets a larger durable volume. NebulaDB's HNSW index is
  # RAM-bound (~4 bytes/dim/doc) so bump memory here as the corpus grows.
  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "500m"
      memory: "1Gi"

  persistence:
    enabled: true
    storageClass: local-path
    size: 50Gi
    accessModes:
      - ReadWriteOnce

  ingress:
    enabled: true
    className: wslproxy
    annotations:
      cert-manager.io/cluster-issuer: main-issuer
    hosts:
      - host: showcase.nebuladb.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - showcase.nebuladb.net
        secretName: nebuladb-prod-tls

showcase:
  enabled: true
  image:
    repository: bwalia/nebula-showcase
    tag: "latest"
    pullPolicy: IfNotPresent

# App secrets from wslvault (ESO) — pulls secret/nebuladb/prod/config
# Disabled until Vault is provisioned (policy granting read on
# secret/nebuladb/* + seeded secret/nebuladb/prod/config). helm --wait
# gates the rollout on this CR, so enabling it before Vault is ready
# times out the deploy; nebula-server runs fine via optional envFrom.
# Flip to true once the Vault policy + seed exist.
externalSecret:
  enabled: false
environment: prod
