# Integration environment — namespace `int`, host int-nebuladb.nebuladb.net.
#
# Layered on top of values.yaml by the deploy-k3s workflow:
#   helm upgrade --install nebuladb ./deploy/helm/nebuladb \
#     -f values-int.yaml --set server.image.tag=<sha> \
#     --set showcase.image.tag=<sha> -n int --create-namespace
#
# Images are public Docker Hub (bwalia/*), so no imagePullSecret is
# needed. TLS is issued by cert-manager (`main-issuer`) and the host is
# published through the `wslproxy` ingress controller — point DNS for
# int-nebuladb.nebuladb.net at the wslproxy ingress.

server:
  image:
    repository: bwalia/nebula-server
    # `tag` is overridden at deploy time with the commit short-SHA.
    tag: "latest"
    pullPolicy: IfNotPresent

  # Durable database: WAL + snapshots on a PVC (k3s local-path).
  # Recreate strategy + single replica are already the chart defaults.
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  ingress:
    enabled: true
    className: wslproxy
    annotations:
      cert-manager.io/cluster-issuer: main-issuer
    hosts:
      - host: int-nebuladb.nebuladb.net
        paths:
          # No `service`/`portName` → defaults to the showcase gateway.
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - int-nebuladb.nebuladb.net
        secretName: nebuladb-int-tls

showcase:
  enabled: true
  image:
    repository: bwalia/nebula-showcase
    tag: "latest"
    pullPolicy: IfNotPresent

# App secrets from wslvault (ESO) — pulls secret/nebuladb/int/config.
# Disabled until Vault is provisioned: the ESO token needs a policy
# granting read on secret/nebuladb/* AND the path must be seeded with
# NEBULA_JWT_SECRET / NEBULA_API_KEYS / NEBULA_OPENAI_API_KEY. helm
# --wait gates the whole rollout on this CR's readiness, so enabling it
# before Vault is ready times out the deploy. nebula-server consumes the
# secret via an optional envFrom, so it runs fine without it meanwhile.
# Flip to true once the Vault policy + seed exist.
externalSecret:
  enabled: false
environment: int
