# Integration environment — namespace `int`, host int.nebuladb.net.
#
# Layered on top of values.yaml by the deploy-k3s workflow:
#   helm upgrade --install nebuladb ./deploy/helm/nebuladb \
#     -f values-int.yaml --set server.image.tag=<sha> \
#     --set showcase.image.tag=<sha> -n int --create-namespace
#
# Images are public Docker Hub (bwalia/*), so no imagePullSecret is
# needed. TLS is issued by cert-manager (`main-issuer`) and the host is
# published through the `wslproxy` ingress controller — point DNS for
# int.nebuladb.net at the wslproxy ingress.

server:
  image:
    repository: bwalia/nebula-server
    # `tag` is overridden at deploy time with the commit short-SHA.
    tag: "latest"
    pullPolicy: IfNotPresent

  # Durable database: WAL + snapshots on a PVC (k3s local-path).
  # Recreate strategy + single replica are already the chart defaults.
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  ingress:
    enabled: true
    className: wslproxy
    annotations:
      cert-manager.io/cluster-issuer: main-issuer
    hosts:
      - host: int.nebuladb.net
        paths:
          # No `service`/`portName` → defaults to the showcase gateway.
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - int.nebuladb.net
        secretName: nebuladb-int-tls

showcase:
  enabled: true
  image:
    repository: bwalia/nebula-showcase
    tag: "latest"
    pullPolicy: IfNotPresent

# App secrets from wslvault (ESO) — pulls secret/nebuladb/int/config
externalSecret:
  enabled: true
environment: int
