{{- if .Values.server.ingress.enabled -}}
{{- $fullName := include "nebuladb.fullname" . -}}
{{- $showcaseSvc := printf "%s-showcase" $fullName -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "nebuladb.server.selectorLabels" . | nindent 4 }}
    {{- include "nebuladb.labels" . | nindent 4 }}
  {{- with .Values.server.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.server.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.server.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.server.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                # Default backend is the showcase gateway: its nginx
                # serves the React UI at `/` and reverse-proxies
                # `/api`, `/healthz`, `/metrics` to the server Service —
                # so one host exposes both UI and API with no CORS.
                # Override per-path with `service:` + `portName:`
                # (e.g. `rest`) to route straight at the raw server.
                name: {{ .service | default $showcaseSvc }}
                port:
                  {{- if .portName }}
                  name: {{ .portName }}
                  {{- else }}
                  number: {{ .portNumber | default 80 }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end -}}
