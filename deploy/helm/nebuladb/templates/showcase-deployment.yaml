{{- if .Values.showcase.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nebuladb.fullname" . }}-showcase
  labels:
    {{- include "nebuladb.showcase.selectorLabels" . | nindent 4 }}
    {{- include "nebuladb.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nebuladb.showcase.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nebuladb.showcase.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: showcase
          image: "{{ .Values.showcase.image.repository }}:{{ .Values.showcase.image.tag }}"
          imagePullPolicy: {{ .Values.showcase.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # The showcase's nginx layer runs envsubst on startup and
            # proxies /api, /healthz, /metrics to this URL. We inject
            # the server Service DNS here so a basic `helm install`
            # has a working UI out of the box.
            - name: NEBULA_SERVER
              value: {{ include "nebuladb.showcase.serverUrl" . | quote }}
          {{- with .Values.showcase.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebuladb.fullname" . }}-showcase
  labels:
    {{- include "nebuladb.showcase.selectorLabels" . | nindent 4 }}
    {{- include "nebuladb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.showcase.service.type }}
  selector:
    {{- include "nebuladb.showcase.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.showcase.service.port }}
      targetPort: http
      protocol: TCP
{{- end -}}
