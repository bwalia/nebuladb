{{- $secretName := printf "%s-secrets" (include "nebuladb.fullname" .) -}}
{{- if .Values.externalSecret.enabled }}
# App secrets sourced from Vault (wslvault) via the External Secrets
# Operator — same pattern as beacon. Populate the Vault path
#   {{ .Values.externalSecret.vaultKeyPrefix }}/{{ .Values.environment }}/{{ .Values.externalSecret.vaultKeySuffix }}
# with any of: NEBULA_JWT_SECRET, NEBULA_API_KEYS, NEBULA_OPENAI_API_KEY.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "nebuladb.server.selectorLabels" . | nindent 4 }}
    {{- include "nebuladb.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        {{- if not .Values.environment }}
        {{- fail "externalSecret.enabled=true requires `environment` (int|test|acc|prod) to build the Vault path" }}
        {{- end }}
        key: {{ .Values.externalSecret.vaultKeyPrefix }}/{{ .Values.environment }}/{{ .Values.externalSecret.vaultKeySuffix }}
        # Match ESO admission-webhook defaults so GitOps never reports a
        # cosmetic OutOfSync diff on these fields.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- else if .Values.secrets }}
# Fallback plain Secret for local testing WITHOUT Vault
# (externalSecret.enabled=false). Provide values via
# `--set secrets.NEBULA_JWT_SECRET=...`. NEVER commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "nebuladb.server.selectorLabels" . | nindent 4 }}
    {{- include "nebuladb.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{- if ne (toString $v) "" }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
