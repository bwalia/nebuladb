# Acceptance environment — namespace `acc`, host acc.nebuladb.net.
# See values-int.yaml for the full rationale; only host/namespace/TLS
# secret differ per environment.

server:
  image:
    repository: bwalia/nebula-server
    tag: "latest"
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  ingress:
    enabled: true
    className: wslproxy
    annotations:
      cert-manager.io/cluster-issuer: main-issuer
    hosts:
      - host: acc.nebuladb.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - acc.nebuladb.net
        secretName: nebuladb-acc-tls

showcase:
  enabled: true
  image:
    repository: bwalia/nebula-showcase
    tag: "latest"
    pullPolicy: IfNotPresent

# App secrets from wslvault (ESO) — pulls secret/nebuladb/acc/config
# Disabled until Vault is provisioned (policy granting read on
# secret/nebuladb/* + seeded secret/nebuladb/acc/config). helm --wait
# gates the rollout on this CR, so enabling it before Vault is ready
# times out the deploy; nebula-server runs fine via optional envFrom.
# Flip to true once the Vault policy + seed exist.
externalSecret:
  enabled: false
environment: acc
