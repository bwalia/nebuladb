<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1180" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1180" fill="#f8fafc"/>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">
    NebulaDB Durability Architecture
  </text>
  <text x="700" y="66" text-anchor="middle" font-size="14" fill="#64748b">
    Write-Ahead Log + Snapshot + Recovery. How a write survives a crash and how the UI exposes it.
  </text>

  <!-- =================================================== -->
  <!-- LAYER 1: CLIENT                                     -->
  <!-- =================================================== -->
  <g>
    <rect x="540" y="100" width="320" height="70" rx="10" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
    <text x="700" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Client</text>
    <text x="700" y="150" text-anchor="middle" font-size="12" fill="#334155">REST / gRPC / pgwire + Showcase Admin UI</text>
  </g>

  <!-- =================================================== -->
  <!-- LAYER 2: SERVER / API                               -->
  <!-- =================================================== -->
  <g>
    <rect x="60" y="220" width="1280" height="120" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="85" y="250" font-size="16" font-weight="700" fill="#312e81">nebula-server  ·  axum HTTP router</text>
    <text x="85" y="272" font-size="12" fill="#4338ca">
      Why: entry point. Terminates auth, rate-limit, tracing; dispatches to the index. All persistence decisions are delegated downstream.
    </text>

    <!-- write endpoints -->
    <rect x="85" y="288" width="300" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
    <text x="95" y="306" font-size="11" font-weight="600" fill="#4338ca">WRITE</text>
    <text x="95" y="322" font-size="11" fill="#1e293b">POST /bucket/:b/doc  ·  /document  ·  /docs/bulk</text>

    <!-- read endpoints -->
    <rect x="405" y="288" width="300" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
    <text x="415" y="306" font-size="11" font-weight="600" fill="#4338ca">READ</text>
    <text x="415" y="322" font-size="11" fill="#1e293b">GET /bucket/:b/doc/:id  ·  POST /vector/search</text>

    <!-- admin endpoints -->
    <rect x="725" y="288" width="300" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
    <text x="735" y="306" font-size="11" font-weight="600" fill="#4338ca">ADMIN · durability</text>
    <text x="735" y="322" font-size="11" fill="#1e293b">GET /admin/durability  ·  POST /admin/snapshot</text>

    <!-- env -->
    <rect x="1045" y="288" width="275" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
    <text x="1055" y="306" font-size="11" font-weight="600" fill="#4338ca">ENV</text>
    <text x="1055" y="322" font-size="11" fill="#1e293b">NEBULA_DATA_DIR → persistent mode</text>
  </g>

  <!-- =================================================== -->
  <!-- LAYER 3: INDEX + WAL (the core)                     -->
  <!-- =================================================== -->
  <!-- TextIndex (left) -->
  <g>
    <rect x="60" y="390" width="640" height="260" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="85" y="420" font-size="16" font-weight="700" fill="#064e3b">nebula-index  ·  TextIndex (in-memory authority)</text>
    <text x="85" y="442" font-size="12" fill="#047857">
      Why: serving layer. All reads hit RAM — HNSW graph + doc map. Writes
    </text>
    <text x="85" y="458" font-size="12" fill="#047857">
      are applied here only AFTER the WAL has durably accepted them.
    </text>

    <!-- docs map -->
    <rect x="85" y="478" width="280" height="70" rx="8" fill="#ffffff" stroke="#10b981"/>
    <text x="95" y="500" font-size="13" font-weight="700" fill="#064e3b">Docs HashMap</text>
    <text x="95" y="519" font-size="11" fill="#334155">(bucket, external_id) → internal Id</text>
    <text x="95" y="535" font-size="11" fill="#334155">internal Id → text + metadata + parent</text>

    <!-- HNSW -->
    <rect x="385" y="478" width="290" height="70" rx="8" fill="#ffffff" stroke="#10b981"/>
    <text x="395" y="500" font-size="13" font-weight="700" fill="#064e3b">HNSW Graph (vectors)</text>
    <text x="395" y="519" font-size="11" fill="#334155">arena + neighbors + node levels</text>
    <text x="395" y="535" font-size="11" fill="#334155">tombstones + entry point</text>

    <!-- public ops -->
    <rect x="85" y="562" width="590" height="70" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-dasharray="4 3"/>
    <text x="95" y="584" font-size="12" font-weight="700" fill="#064e3b">Public ops</text>
    <text x="95" y="603" font-size="11" fill="#334155">
      open_persistent() · upsert_text() · upsert_document() · delete() · empty_bucket()
    </text>
    <text x="95" y="620" font-size="11" fill="#334155">
      snapshot() · compact_wal() · wal_stats()
    </text>
  </g>

  <!-- WAL (right) -->
  <g>
    <rect x="720" y="390" width="620" height="260" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="745" y="420" font-size="16" font-weight="700" fill="#78350f">nebula-wal  ·  Write-Ahead Log</text>
    <text x="745" y="442" font-size="12" fill="#92400e">
      Why: durability gate. Every mutation is framed + fsynced here
    </text>
    <text x="745" y="458" font-size="12" fill="#92400e">
      before being applied in RAM. Crash-safe replay rebuilds TextIndex.
    </text>

    <!-- record format -->
    <rect x="745" y="478" width="290" height="70" rx="8" fill="#ffffff" stroke="#f59e0b"/>
    <text x="755" y="500" font-size="13" font-weight="700" fill="#78350f">Frame format</text>
    <text x="755" y="519" font-size="11" fill="#334155">[u32 len][u32 crc32][bincode body]</text>
    <text x="755" y="535" font-size="11" fill="#334155">short-read / bad-crc ⇒ truncate tail</text>

    <!-- segments -->
    <rect x="1055" y="478" width="265" height="70" rx="8" fill="#ffffff" stroke="#f59e0b"/>
    <text x="1065" y="500" font-size="13" font-weight="700" fill="#78350f">Segment rotation</text>
    <text x="1065" y="519" font-size="11" fill="#334155">64 MiB per segment</text>
    <text x="1065" y="535" font-size="11" fill="#334155">NEBWAL01 magic header</text>

    <!-- record variants -->
    <rect x="745" y="562" width="575" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4 3"/>
    <text x="755" y="584" font-size="12" font-weight="700" fill="#78350f">Record variants (bincode)</text>
    <text x="755" y="603" font-size="11" fill="#334155">
      UpsertText { bucket, id, text, vector, metadata_json }
    </text>
    <text x="755" y="620" font-size="11" fill="#334155">
      UpsertDocument · Delete · DeleteDocument · EmptyBucket
    </text>
  </g>

  <!-- =================================================== -->
  <!-- LAYER 4: DISK                                       -->
  <!-- =================================================== -->
  <g>
    <rect x="60" y="700" width="1280" height="170" rx="12" fill="#f5f5f4" stroke="#57534e" stroke-width="2"/>
    <text x="85" y="730" font-size="16" font-weight="700" fill="#1c1917">Disk  ·  $NEBULA_DATA_DIR  (PVC in k8s, docker volume in compose)</text>
    <text x="85" y="752" font-size="12" fill="#44403c">
      Why: the only thing that outlives the process. Atomicity via .part → fsync → rename → .ok marker.
    </text>

    <!-- wal dir -->
    <rect x="85" y="770" width="600" height="85" rx="8" fill="#ffffff" stroke="#78716c"/>
    <text x="95" y="792" font-size="13" font-weight="700" fill="#1c1917">wal/</text>
    <text x="95" y="811" font-size="11" fill="#334155" font-family="ui-monospace, SFMono-Regular, monospace">0000000000.nwal   ← current segment (append-only)</text>
    <text x="95" y="827" font-size="11" fill="#334155" font-family="ui-monospace, SFMono-Regular, monospace">0000000001.nwal   ← rotated</text>
    <text x="95" y="843" font-size="11" fill="#334155" font-family="ui-monospace, SFMono-Regular, monospace">...              ← compact_wal() prunes pre-snapshot ones</text>

    <!-- snapshots dir -->
    <rect x="710" y="770" width="610" height="85" rx="8" fill="#ffffff" stroke="#78716c"/>
    <text x="720" y="792" font-size="13" font-weight="700" fill="#1c1917">snapshots/</text>
    <text x="720" y="811" font-size="11" fill="#334155" font-family="ui-monospace, SFMono-Regular, monospace">snapshot-&lt;seq&gt;.nsnap      ← zstd(header + hnsw)</text>
    <text x="720" y="827" font-size="11" fill="#334155" font-family="ui-monospace, SFMono-Regular, monospace">snapshot-&lt;seq&gt;.nsnap.ok   ← commit marker (atomic)</text>
    <text x="720" y="843" font-size="11" fill="#334155" font-family="ui-monospace, SFMono-Regular, monospace">header.wal_seq_at_snapshot → replay boundary</text>
  </g>

  <!-- =================================================== -->
  <!-- LAYER 5: FLOW LEGEND                                -->
  <!-- =================================================== -->
  <g>
    <rect x="60" y="905" width="1280" height="250" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="85" y="935" font-size="16" font-weight="700" fill="#0f172a">Flows — how the pieces move together</text>

    <!-- Write flow -->
    <g>
      <circle cx="95" cy="965" r="6" fill="#2563eb"/>
      <text x="110" y="970" font-size="13" font-weight="700" fill="#1e3a8a">WRITE  (blue)</text>
      <text x="110" y="988" font-size="11" fill="#334155">
        1. Client → POST /bucket/:b/doc
      </text>
      <text x="110" y="1004" font-size="11" fill="#334155">
        2. Router → TextIndex.upsert_text
      </text>
      <text x="110" y="1020" font-size="11" fill="#334155">
        3. WAL.append (len+crc+body, fsync)   ← gate
      </text>
      <text x="110" y="1036" font-size="11" fill="#334155">
        4. Apply in-memory: docs map + HNSW
      </text>
      <text x="110" y="1052" font-size="11" fill="#64748b" font-style="italic">
        Ack only after step 4. Crash before 3 = no record.
      </text>
    </g>

    <!-- Snapshot flow -->
    <g>
      <circle cx="365" cy="965" r="6" fill="#ea580c"/>
      <text x="380" y="970" font-size="13" font-weight="700" fill="#9a3412">SNAPSHOT  (orange)</text>
      <text x="380" y="988" font-size="11" fill="#334155">
        1. Admin → POST /admin/snapshot
      </text>
      <text x="380" y="1004" font-size="11" fill="#334155">
        2. Capture current WAL seq
      </text>
      <text x="380" y="1020" font-size="11" fill="#334155">
        3. Serialize docs + HNSW → zstd → .part
      </text>
      <text x="380" y="1036" font-size="11" fill="#334155">
        4. fsync → rename → write .ok marker
      </text>
      <text x="380" y="1052" font-size="11" fill="#64748b" font-style="italic">
        Torn snapshot? No .ok → loader skips it.
      </text>
    </g>

    <!-- Recovery flow -->
    <g>
      <circle cx="635" cy="965" r="6" fill="#7c3aed"/>
      <text x="650" y="970" font-size="13" font-weight="700" fill="#5b21b6">RECOVERY  (purple, on boot)</text>
      <text x="650" y="988" font-size="11" fill="#334155">
        1. open_persistent(data_dir)
      </text>
      <text x="650" y="1004" font-size="11" fill="#334155">
        2. Load newest .ok-committed snapshot
      </text>
      <text x="650" y="1020" font-size="11" fill="#334155">
        3. WAL.validate_and_truncate (torn tail)
      </text>
      <text x="650" y="1036" font-size="11" fill="#334155">
        4. Replay WAL records after snapshot seq
      </text>
      <text x="650" y="1052" font-size="11" fill="#64748b" font-style="italic">
        Embedder-free: WAL stores resolved vectors.
      </text>
    </g>

    <!-- Compact flow -->
    <g>
      <circle cx="920" cy="965" r="6" fill="#16a34a"/>
      <text x="935" y="970" font-size="13" font-weight="700" fill="#14532d">COMPACT  (green)</text>
      <text x="935" y="988" font-size="11" fill="#334155">
        1. Admin → POST /admin/wal/compact
      </text>
      <text x="935" y="1004" font-size="11" fill="#334155">
        2. Find segments &lt; latest snapshot seq
      </text>
      <text x="935" y="1020" font-size="11" fill="#334155">
        3. Delete — snapshot supersedes them
      </text>
      <text x="935" y="1036" font-size="11" fill="#334155">
        4. Current segment always retained
      </text>
      <text x="935" y="1052" font-size="11" fill="#64748b" font-style="italic">
        Keeps disk bounded; never the active segment.
      </text>
    </g>

    <!-- UI flow -->
    <g>
      <circle cx="1155" cy="965" r="6" fill="#475569"/>
      <text x="1170" y="970" font-size="13" font-weight="700" fill="#1e293b">ADMIN UI  (slate)</text>
      <text x="1170" y="988" font-size="11" fill="#334155">
        Showcase → Admin tab
      </text>
      <text x="1170" y="1004" font-size="11" fill="#334155">
        DurabilityPanel (3s poll)
      </text>
      <text x="1170" y="1020" font-size="11" fill="#334155">
        Stats + Snapshot + Compact buttons
      </text>
      <text x="1170" y="1036" font-size="11" fill="#334155">
        Falls back to explainer in RAM mode
      </text>
      <text x="1170" y="1052" font-size="11" fill="#64748b" font-style="italic">
        Operator visibility without shelling in.
      </text>
    </g>

    <!-- footer -->
    <text x="85" y="1105" font-size="12" fill="#475569">
      Crash safety invariants:
    </text>
    <text x="85" y="1124" font-size="11" fill="#334155">
      (a) ack ⇒ fsynced WAL record    (b) snapshot visible ⇒ .ok present    (c) torn WAL tail ⇒ truncate to last good record    (d) replay is idempotent
    </text>
    <text x="85" y="1142" font-size="11" fill="#64748b" font-style="italic">
      Mode switch: unset NEBULA_DATA_DIR ⇒ pure in-memory (no WAL, no snapshot, no recovery). Tests cover all three recovery modes.
    </text>
  </g>

  <!-- =================================================== -->
  <!-- ARROWS                                              -->
  <!-- =================================================== -->

  <!-- Client → Router (write, blue) -->
  <path d="M 680 170 L 680 220" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="688" y="200" font-size="10" fill="#1e3a8a" font-weight="600">write</text>

  <!-- Client → Router (read, green) -->
  <path d="M 720 170 L 720 220" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="728" y="200" font-size="10" fill="#14532d" font-weight="600">read</text>

  <!-- Router → WAL (write path, blue) -->
  <path d="M 1000 340 L 1000 390" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="1008" y="368" font-size="10" fill="#1e3a8a" font-weight="600">1. append</text>

  <!-- WAL → TextIndex (after durable, blue, curved) -->
  <path d="M 720 520 C 710 520 710 520 700 520" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="625" y="510" font-size="10" fill="#1e3a8a" font-weight="600">2. apply in-memory</text>

  <!-- Router → TextIndex (read, green) -->
  <path d="M 400 340 L 400 390" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="408" y="368" font-size="10" fill="#14532d" font-weight="600">read</text>

  <!-- WAL → Disk (orange for fsync) -->
  <path d="M 1030 650 L 1030 700" stroke="#d97706" stroke-width="2.5" fill="none" marker-end="url(#arrow-slate)"/>
  <text x="1038" y="678" font-size="10" fill="#78350f" font-weight="600">fsync</text>

  <!-- TextIndex → Disk (snapshot, orange) -->
  <path d="M 380 650 L 380 700" stroke="#ea580c" stroke-width="2.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="388" y="678" font-size="10" fill="#9a3412" font-weight="600">snapshot()</text>

  <!-- Disk → TextIndex (recovery, purple, curved up) -->
  <path d="M 230 700 C 230 670 230 670 230 650" stroke="#7c3aed" stroke-width="2.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="135" y="683" font-size="10" fill="#5b21b6" font-weight="600">recovery: snapshot + replay</text>

  <!-- Admin → Server (admin endpoints) -->
  <path d="M 860 135 L 1180 135 L 1180 220" stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-slate)"/>
  <text x="1020" y="128" font-size="10" fill="#334155" font-weight="600">admin: durability / snapshot / compact</text>

</svg>
