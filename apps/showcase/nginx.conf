# OpenResty config for the showcase edge. The official OpenResty image
# runs `envsubst` over /etc/nginx/templates/ on startup, replacing
# ${NEBULA_SERVER} with the env var (same mechanism as stock nginx).
#
# Routing model (design 0009 §7):
#   * READS  (GET/HEAD, plus the SELECT-only POST /api/v1/query[/explain])
#     go through the `nebula_read_pool` weighted upstream — leader
#     preferred, follower as 503-failover. Reads tolerate a slightly
#     stale follower, so static weighting is fine.
#   * WRITES are routed in Lua to whichever node currently reports
#     `role=leader` (polled via the cheap /healthz/role), and a write
#     that hits a node which has just lost leadership (409) is retried
#     on the other node within the SAME request. This follows a
#     leadership handoff at request time with NO nginx reload — the
#     rolling orchestrator only has to fence + promote for correctness,
#     not repoint the load balancer.
#
# Why Lua and not a static weighted write pool: a static weight sends
# writes to one node even after leadership moves; that node is then an
# up-but-follower and 409s the write, which nginx cannot fail over
# (no http_409 retry token). Lua re-resolves the leader and retries.

# Docker's embedded DNS — needed so we can use a variable in proxy_pass
# (otherwise nginx resolves once at boot and never again). Also used by
# the Lua cosocket resolver for the /healthz/role probes.
resolver 127.0.0.11 valid=10s ipv6=off;

# Lua modules (leader_route, write_proxy) and the vendored lua-resty-http
# are installed into OpenResty's default lualib dir by the Dockerfile, so
# they're on the built-in search path — no lua_package_path needed. A
# tiny shared dict caches the current leader URL across worker requests
# (short TTL — see leader_route.lua).
lua_shared_dict leader_cache 64k;

# Read pool: leader + follower as EQUAL members with max_fails=0.
#
# `max_fails=0` (never passively eject a node) means nginx always has a
# live upstream to try, so a 503 from the first-tried node fails over to
# the OTHER node within the same request (http_503 in proxy_next_upstream
# below) and a both-nodes-503 window returns a clean intercepted 503,
# never a synthesized 502.
#
# `weight=100` on the leader makes reads STRONGLY PREFER it (~99%) so the
# follower (which serves a replication-lagged view and periodically
# stalls ~2 min taking the shared snapshot, design 0007 §4) only takes
# ~1% of reads but STILL receives full failover when the leader 503s.
upstream nebula_read_pool {
    server nebula-server:8080 weight=100 max_fails=0;
    server nebula-follower:8080 max_fails=0;
    keepalive 16;
}

# Reads vs SQL-query classification (writes are handled in Lua, not here).
map $request_method $is_read_method {
    default     0;
    GET         1;
    HEAD        1;
}
map $uri $is_sql_query_path {
    default                     0;
    /api/v1/query               1;
    /api/v1/query/explain       1;
}
# 1 when this request is a READ (GET/HEAD any path, or a SELECT-only SQL
# POST). 0 means it's a genuine write → routed in Lua.
map "$is_read_method$is_sql_query_path" $is_read {
    default     0;
    "10"        1;
    "11"        1;
    "01"        1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 503-from-upstream interception for READS (writes get their clean
    # 503 from the Lua handler). When a node is in WAL recovery it returns
    # a 503 with an internal body; that body must never reach a client.
    proxy_intercept_errors on;
    error_page 503 = @service_unavailable;

    location @service_unavailable {
        internal;
        add_header Retry-After 30 always;
        add_header Content-Type application/json always;
        return 503 '{"error":"service temporarily unavailable, retry shortly"}';
    }

    # Single-page app: anything that isn't a real file resolves to
    # index.html so client-side navigation works on deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Streaming endpoints (SSE) need long timeouts and go straight to the
    # configured server. These are reads (GET), so leader-preference
    # isn't load-bearing; pin to ${NEBULA_SERVER} as before.
    location ~ ^/api/v1/(ai/rag|admin/logs/stream)$ {
        proxy_pass ${NEBULA_SERVER};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # All other /api/ calls. READS go through the weighted read pool with
    # 503-failover; WRITES are handed to the Lua write proxy, which routes
    # to the current leader and retries the other node on a 409 (design
    # 0009 §7). The split is decided per request by $is_read.
    location /api/ {
        # Writes: content handled entirely in Lua (leader resolve +
        # forward + 409-retry). The `if` is safe here — it only selects
        # a content handler, the documented-safe use of `if` in location.
        set $is_read_flag $is_read;
        if ($is_read_flag = 0) {
            content_by_lua_file /usr/local/openresty/site/lualib/write_proxy.lua;
        }

        # Reads: weighted pool with fast failover.
        proxy_pass http://nebula_read_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_send_timeout 10s;
        proxy_read_timeout 15s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 20s;
    }

    location /healthz {
        proxy_pass http://nebula_read_pool;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
    location /metrics {
        proxy_pass ${NEBULA_SERVER};
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Cache immutable hashed assets aggressively; index.html stays
    # short-cached so a redeploy actually reaches users.
    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
