# nginx config for the showcase. nginx's official image runs
# `envsubst` over every file in /etc/nginx/templates/ on startup,
# replacing `${NEBULA_SERVER}` with the env var. That lets the same
# image work in compose (service name) or standalone (host.docker.internal).
#
# Read failover: GET / HEAD requests, plus POST /api/v1/query[/explain]
# (the SQL endpoints — POST is just the carrier for the body, the
# engine itself is SELECT-only), go through the `nebula_read_pool`
# upstream so reads stay available during a leader outage (the
# follower serves them). Genuine writes (POST/PUT/PATCH/DELETE on
# bucket and admin routes) stay pinned to ${NEBULA_SERVER} since
# the follower rejects them with 409. When the leader is back up,
# the pool's primary is preferred again automatically by nginx's
# `backup` directive.

# Docker's embedded DNS — needed so we can use a variable in
# proxy_pass (otherwise nginx resolves once at boot and never again).
resolver 127.0.0.11 valid=30s ipv6=off;

# Read pool: leader + follower as EQUAL members with max_fails=0.
#
# Two requirements that fought each other historically:
#   1. Fail a read over to the healthy node when the other returns 503
#      (so reads stay up while ONE node is recovering — the common case).
#   2. Never synthesize a "no live upstreams" 502 when BOTH are 503
#      (simultaneous recovery on a deploy).
#
# `max_fails=0` (never passively eject a node) satisfies both: because no
# node is ever marked "down", nginx always has a live upstream to try, so
# the 502 cannot occur; and with `http_503` back in proxy_next_upstream
# (below) a 503 from the first-tried node makes nginx try the OTHER node
# within the same request. If both 503, it returns the last 503 (passed
# through to the error_page intercept → clean 503), never a 502.
#
# This is EQUAL round-robin (not leader-primary + `backup`): `backup` only
# activates when the primary is passively marked down, which max_fails=0
# prevents — so a `backup` follower would never receive the 503 failover.
#
# `weight=100` on the leader makes reads STRONGLY PREFER it (~99%) instead
# of even round-robin. Even round-robin sent ~50% of reads to the follower,
# which (a) serves a replication-lagged view and (b) stalls for ~2 min while
# IT takes the periodic snapshot (design 0007 §4 — snapshots run on the
# follower now) and can fall behind + saturate CPU catching up — so half the
# reads intermittently timed out ("503 on and off"). With the weight, the
# follower only takes ~1% of normal reads but STILL receives full failover
# when the leader returns 503/error (http_503 below), so a leader recovery
# still keeps reads up. No 502: max_fails=0 means neither node is ejected.
upstream nebula_read_pool {
    server nebula-server:8080 weight=100 max_fails=0;
    server nebula-follower:8080 max_fails=0;
    keepalive 16;
}

# Write pool (design 0009 §7). Writes used to be pinned to a single
# ${NEBULA_SERVER} with no failover, so a leader outage dropped writes
# for the full multi-hour recovery. Now both nodes are members with the
# leader STRONGLY preferred (weight=100) — normal writes hit the leader,
# but a leader that's down/timing-out/503 fails the write over to the
# other node.
#
# Why this is safe even though a follower 409s writes: the rolling
# orchestrator (design 0009 §8) PROMOTES the standby BEFORE the current
# leader is drained, so by the time writes fail over here the target is
# already a leader that accepts them. nginx's proxy_next_upstream has no
# `http_409` token anyway — it can only retry on connection error /
# timeout / 5xx, which is exactly the "leader went away" signal we want.
# The 409 body (a write that lands on a still-follower in a mis-ordered
# window) is intercepted below so the internal payload never leaks; it
# is not a failover trigger.
#
# max_fails=0 (never passively eject) for the same reason as the read
# pool: it guarantees nginx always has a live upstream to try, so a
# both-nodes-recovering window yields a clean intercepted 503, never a
# synthesized 502.
upstream nebula_write_pool {
    server nebula-server:8080 weight=100 max_fails=0;
    server nebula-follower:8080 max_fails=0;
    keepalive 16;
}

# Route reads through the pool; writes go straight to ${NEBULA_SERVER}.
# `map` is evaluated per request, so a sustained outage on the leader
# correctly steers reads to the follower without nginx reload.
#
# Two tracks for routing:
#   * GET / HEAD on /api/*           → always read pool (genuine reads)
#   * POST on /api/v1/query[/explain] → also read pool (SQL is SELECT-
#                                       only here, so POST is just the
#                                       carrier for the body)
#   * everything else                → pinned to ${NEBULA_SERVER}
#
# We compute a single `$route_kind` key off (method, uri) and map that
# to the upstream. Chaining maps with variable substitution works in
# nginx 1.11+ but the dispatch is easier to read inline.
map $request_method $is_read_method {
    default     0;
    GET         1;
    HEAD        1;
}

map $uri $is_sql_query_path {
    default                     0;
    /api/v1/query               1;
    /api/v1/query/explain       1;
}

# Concatenate the two flags so the destination map has a single key.
# "1?" matches a GET/HEAD (any path); "?1" matches a SQL-query POST.
# The default (genuine writes) now goes through nebula_write_pool so a
# leader outage fails the write over to the promoted standby (design
# 0009 §7) instead of the old single-host pin with no failover.
map "$is_read_method$is_sql_query_path" $api_upstream {
    default     "http://nebula_write_pool";
    "10"        "http://nebula_read_pool";
    "11"        "http://nebula_read_pool";
    "01"        "http://nebula_read_pool";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 503-from-upstream interception. When nebula-server is in WAL
    # recovery the boot stub's fallback handler returns 503 with an
    # implementation-internal body:
    #     {"code":"recovering","error":"server is still in WAL
    #      recovery; retry shortly"}
    # That body is useful for ops debugging (it's what shows up in
    # `docker logs` and curl smoke tests) but it must NEVER reach a
    # client in HA mode — clients should see a generic 503 with a
    # Retry-After header and back off.
    #
    # Reads go through `nebula_read_pool`, which deliberately does NOT
    # treat 503 as a failover trigger (a recovering node is live, and on
    # a deploy both nodes recover together). So a read 503 lands here too
    # and gets the same clean generic body + Retry-After.
    #
    # Writes now go through `nebula_write_pool` and DO fail over on
    # connection error / timeout / 5xx (design 0009 §7), so a leader
    # outage no longer drops writes for the recovery window. Two leaked
    # internal bodies are intercepted to a clean generic response:
    #   * 503 — a recovering node ("server is still in WAL recovery").
    #   * 409 — a write that landed on a still-follower (read_only_follower)
    #     in a brief mis-ordered window; the orchestrator promotes before
    #     draining so this is rare, but the body must never reach a client.
    proxy_intercept_errors on;
    error_page 503 = @service_unavailable;
    error_page 409 = @write_conflict;

    # Custom 503 response: no upstream body, just a brief generic
    # message + Retry-After. 30s is a reasonable default — long
    # enough that a client won't busy-loop, short enough that it
    # picks up within a typical WAL replay window.
    location @service_unavailable {
        internal;
        add_header Retry-After 30 always;
        add_header Content-Type application/json always;
        return 503 '{"error":"service temporarily unavailable, retry shortly"}';
    }

    # Custom 409 response: a write reached a follower (the only source of
    # 409 in the server today — the read_only_follower guard). Replace the
    # internal body with a clean generic one + a short Retry-After so a
    # client retries into the promoted leader. Rare by construction
    # (the orchestrator promotes before draining), defense-in-depth.
    location @write_conflict {
        internal;
        add_header Retry-After 5 always;
        add_header Content-Type application/json always;
        return 503 '{"error":"write temporarily unavailable, retry shortly"}';
    }

    # Single-page app: anything that isn't a real file resolves to
    # index.html so client-side navigation works on deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Streaming endpoints need long timeouts so an SSE connection
    # can sit idle for minutes while the LLM thinks. Carve them
    # out as their own location so the rest of /api/* can use
    # short timeouts (required for fast failover).
    location ~ ^/api/v1/(ai/rag|admin/logs/stream)$ {
        proxy_pass ${NEBULA_SERVER};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        # Don't buffer the SSE stream — tokens reach the browser
        # as the LLM emits them, otherwise nginx holds the response
        # until a buffer threshold and the UI feels stuck.
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # All other API calls: short timeouts so a wedged leader fails
    # over to the follower in seconds rather than minutes.
    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        # Short connect/read timeouts are load-bearing: without them
        # a hung-but-listening leader (Recv-Q full, no accept) traps
        # every request for proxy_read_timeout before failover kicks
        # in. 15s tolerates a slow query without permanently jamming
        # the UI when the leader is sick.
        proxy_connect_timeout 2s;
        proxy_send_timeout 10s;
        proxy_read_timeout 15s;
        # Fail over to the other node on connection errors, timeouts, and
        # 5xx — INCLUDING 503. A 503 means that node is recovering; with
        # max_fails=0 (see the upstream block) trying the next node does
        # NOT risk a "no live upstreams" 502, so we get the best of both:
        # a recovering node's read is served by the healthy node, and if
        # BOTH are recovering the last 503 passes through to the error_page
        # intercept → clean 503 + Retry-After (never a 502).
        #
        # `non_idempotent` lets nginx retry POST/PUT/PATCH/DELETE too —
        # without it nginx refuses to fail over non-idempotent methods,
        # which is exactly the write path we need to keep alive during a
        # leader upgrade (design 0009 §7). NebulaDB writes are idempotent
        # by id (upsert/delete), so a retried write that partially landed
        # on the dying leader converges rather than duplicating. There is
        # no `http_409` token in nginx, so a follower-409 is not retried
        # here — it's intercepted to a clean 503 (above); the rollout's
        # promote-before-drain ordering keeps the failover target writable.
        proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 20s;
    }
    location /healthz {
        proxy_pass http://nebula_read_pool;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        # Same as /api/: fail over on 503 too (max_fails=0 means this can't
        # cause a "no live upstreams" 502), so /healthz reports healthy as
        # long as EITHER node is ready.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
    location /metrics {
        proxy_pass ${NEBULA_SERVER};
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Cache immutable hashed assets aggressively; index.html stays
    # short-cached so a redeploy actually reaches users.
    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
