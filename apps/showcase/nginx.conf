# nginx config for the showcase. nginx's official image runs
# `envsubst` over every file in /etc/nginx/templates/ on startup,
# replacing `${NEBULA_SERVER}` with the env var. That lets the same
# image work in compose (service name) or standalone (host.docker.internal).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: anything that isn't a real file resolves to
    # index.html so client-side navigation works on deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API forwarding. Same paths the server exposes, proxied
    # transparently — the browser sees only port 80.
    location /api/ {
        proxy_pass ${NEBULA_SERVER};
        proxy_http_version 1.1;
        # These three headers are what upstream rate-limit / auth
        # middleware uses to identify the caller; forward them so
        # behavior matches a direct connection.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Disable buffering so SSE (text/event-stream) from /ai/rag
        # reaches the browser byte-by-byte as the LLM emits tokens.
        # Without this nginx holds onto the response until it hits
        # a buffer threshold and the UI feels stuck.
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    location /healthz {
        proxy_pass ${NEBULA_SERVER};
        proxy_set_header Host $host;
    }
    location /metrics {
        proxy_pass ${NEBULA_SERVER};
        proxy_set_header Host $host;
    }

    # Cache immutable hashed assets aggressively; index.html stays
    # short-cached so a redeploy actually reaches users.
    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
