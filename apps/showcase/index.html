<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NebulaDB — Knowledge Ops</title>
    <meta name="description" content="Live showcase of NebulaDB — SQL, documents, vector search, and RAG over one corpus." />
    <!--
      Apply the saved theme *before* React mounts so the page doesn't
      flash light-then-dark. Tailwind reads the `dark` class on <html>.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("nebula-theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
